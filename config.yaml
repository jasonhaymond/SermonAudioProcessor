# Sermon Audio Processor configuration
# =====================================
# Podcast-style spoken-word preset.
#
# All input files are processed to MP3 output.
# Supported input extensions: .mp3, .wav, .wave, .w64, .wav64
#
# Relative folder paths are relative to this project folder. You can also use
# absolute paths for long-term deployment, for example:
#   inbox: "D:/Sermons/To Process"
#   output: "D:/Sermons/Processed"

folders:
  inbox: inbox
  output: output
  originals: originals
  failed: failed
  reports: reports
  processing: processing
  reference_profiles: reference_profiles

threads:
  # Number of concurrent processing threads.
  # Number of files to process at the same time.
  # Be cautious when increasing this value, as it can strain system resources.
  # and can cause performance issues.
  #
  # Good starting values:
  # [Default] MacBook Air: 2
  # Strong Windows desktop: 3-4
  # Use 1 to disable parallel processing.
  max_parallel_jobs: 2


# Optional broad-band EQ reference matching.
# Workflow:
#   1. Pick a good-sounding sermon.
#   2. Run: python -m sermon_processor --make-reference "/path/to/good_sermon.mp3"
#   3. Set enabled: true after you have listened/tested.
#
# This compares low/mid/high tone bands against a saved reference profile and
# applies capped EQ correction. Keep the caps modest to avoid unnatural speech.
eq_match:
  enabled: true
  reference_profile: reference_profiles/standard_sermon.json
  max_boost_db: 3.0
  max_cut_db: -4.0
  min_change_db: 0.5
  bands:
    low:
      freq: 120
      range: [80, 200]
      q: 0.8
    low_mid:
      freq: 300
      range: [200, 500]
      q: 0.9
    mid:
      freq: 1000
      range: [500, 2000]
      q: 0.8
    presence:
      freq: 3500
      range: [2000, 5000]
      q: 0.8
    high:
      freq: 7500
      range: [5000, 10000]
      q: 0.7

processing:
  # Podcast-style spoken-word loudness target.
  # -16 LUFS is common for stereo podcast-style speech.
  target_lufs: -16.0

  # True peak ceiling. Leave headroom so MP3 conversion/playback does not clip.
  true_peak_db: -1.0

  # Loudness range target. Lower = more even; higher = more natural dynamics.
  lra: 6.4

  # Final MP3 technical settings.
  sample_rate: 44100
  mp3_bitrate: 192k

  # Safe spoken-word cleanup. Start gentle, then tune after listening tests.
  highpass_hz: 90
  enable_speech_eq: true
  mud_cut_hz: 250
  mud_cut_q: 1.0
  mud_cut_db: -2.5
  presence_boost_hz: 3500
  presence_boost_q: 1.0
  presence_boost_db: 1.2

  # Noise Reduction settings.
  enable_noise_reduction: true
  noise_reduction_strength: 9

  # Gentle speech compression before loudness normalization.
  enable_compression: true

  # Start around -24dB. Adjust as needed based on the source material.
  compressor_threshold: -24dB
  compressor_ratio: 2.4
  compressor_attack_ms: 1
  compressor_release_ms: 150
  compressor_makeup_db: 2.4

  # Add short fades to clean up hard starts/stops and edge clicks.
  enable_fades: true
  fade_seconds: 0.5

  # Final limiter after loudness normalization.
  enable_limiter: true

  # After successful processing, move the original source into originals/.
  # This keeps inbox/ clean and avoids re-processing after restarts.
  # Set false to copy to originals/ and leave the source file in place.
  archive_move_originals: true

  # Prevent re-processing an already completed output file.
  skip_existing_outputs: true

watcher:
  # How often the watcher loop wakes up while idle.
  poll_seconds: 3

  # File-copy safety: the app waits for the file size to stop changing before processing.
  file_stable_checks: 3
  file_stable_seconds: 2

metadata:
  # For MP3 originals, copy ID3 tags to the output MP3.
  # For WAV/W64 originals, the output MP3 starts with blank ID3 tags.
  preserve_id3_tags: true

  # Adds a small ID3 comment showing when SermonProcessor created the file.
  # Set false if you want completely blank tags for WAV/W64 outputs.
  write_processing_comment: true
